[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    nRF24/RF24           ; เปลี่ยนจาก tmrh20/RF24 เป็น nRF24/RF24
    mikalhart/TinyGPSPlus
    knolleary/PubSubClient